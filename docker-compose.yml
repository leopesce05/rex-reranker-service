version: '3.8'

services:
  reranker-api:
    build: .
    container_name: vllm-reranker
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - VLLM_GPU_MEMORY_UTILIZATION=0.8
      - VLLM_ATTENTION_BACKEND=flash_attn
      - TORCH_HOME=/app/models
    volumes:
      # Cache de modelos de HuggingFace para evitar descargas repetidas
      - ./models:/app/models
      # Logs opcionales
      - ./logs:/app/logs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

